name: Publish package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
      - name: Setup mise
        uses: jdx/mise-action@v4
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Build and test
        run: mise run build
      - name: Publish to GitHub Packages
        run: mise exec -- gradle publishMavenJavaPublicationToGitHubPackagesRepository -Pversion=${GITHUB_REF_NAME#v}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
